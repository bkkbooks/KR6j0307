用又欲除諸瘧病者加持白線依法而用若欲解除瘰癧及諸瘡腫者加持蓽撥與蜜同和塗摩等用又欲除去眼病者加持香水或甘草水或鉢羅舍葉浸水而用若欲息諸鬪戰諍訟者加持淨水洗滌其面若欲擁護王之國境無諸侵撓得強勝者當擇妙好瓶器置潔淨處滿盛其水設諸供養作法者著鮮淨衣讀此陀羅尼而為加持然後取瓶中水隨處散灑即得國界安隱災難不生人及傍生悉能衛護若欲解諸邪印者當用栴檀香末加持二十一遍點自心間即得解除若欲於自住舍作擁護者當用蓮華作護摩法若欲調伏諸難調者當用栴檀香作護摩法復次成就法當用勝香最勝香無畏手香帝手香嚩嚕尼香諾俱梨香那俱梨香畢利煬虞香多誐覽香等并月王藥妙喜藥輪藥大輪藥尾瑟努訖蘭多藥如上諸香藥取以和合而作一丸以此陀羅尼加持一百八遍若有人為諸鬼神執魅怖畏或帶頂上或帶臂上即能衛護若有女人將欲産生取前香藥碎為其末依法加持同入水中當用澡浴即得産生勝福德子安隱無難諸不祥事皆得銷滅又復生已善作擁護離諸苦惱惡毒不生設有所生速疾除遣若初生童子欲作擁護者取前香藥丸依法加持帶其頂上即能擁護若欲禁止風雲雷雹者當取嚩嚕尼樹枝入淨水中依法加持已次執其枝而用散灑世尊我此祕密心陀羅尼能作最上成就如上所說一切法用悉無不成設使持誦未精熟者亦得成就復次宣說本尊成就法若人欲見我身求成就者當於白月十五日依法作㡧以上好不雜彩色畫我形像如大自在天相頂戴寶冠鹿皮為絡腋一切珍寶而為莊嚴如是畫已依法安布行人當於彼㡧像前以瞿摩夷作曼拏羅散諸妙華以八種香安置供養又復排設六十四種出生飲食所用清淨離諸血肉腥雜穢污燒沈水香行人應當晝夜不食一日三時澡沐身體著新淨衣諦心專注獻供養已於㡧像前念此陀羅尼一千八十遍然後諦想本尊儀相乃見自身有大熾焰行人見已心生歡喜須臾即見我身來現其前施諸所求悉令圓滿行人爾時當用雌黃或安膳那藥而用點眼即能隱身亦得騰空自在證入不空智莊嚴三摩地門隨諸所欲一切所作皆得圓滿佛說此經已聖觀自在菩薩摩訶薩及餘自在大自在等梵天衆及淨光天子并諸菩薩聲聞一切大會聞佛所說皆大歡喜信受奉行
