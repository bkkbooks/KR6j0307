body:
  text: 西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫臣施護等奉詔譯如是我聞一時世尊在補陀落迦山聖觀自在菩薩宮中彼有無數大娑羅樹多摩羅樹瞻波迦樹阿輸迦樹阿提目多迦樹如是等種種寶樹而為嚴飾與大苾芻衆一百八十萬菩薩九十俱胝那庾多百千復有自在大自在等諸梵天子及無數百千淨光天子如是等衆恭敬圍繞聽受說法爾時聖觀自在菩薩摩訶薩從座而起偏袒右肩右膝著地向佛合掌恭敬頂禮熙怡微笑前白佛言世尊我有陀羅尼名不空王是祕密心乃往過去九十一劫之前我於普觀世界觀自在王如來所親從聽受時彼如來為無數百千諸梵天子并淨光天子衆教授阿耨多羅三藐三菩提法我於爾時證得不空智等百千三摩地門世尊若諸方處有此祕密心陀羅尼宣通流布當知是處有大自在等一萬二千天子密作衛護是處即同有諸佛塔應當尊重恭敬供養又若有人以此不空王祕密心陀羅尼廣流布者當知是人已於無數俱胝那庾多百千佛所深種善根又若有人暫得聞此陀羅尼者是人設復謗佛謗法及謗菩薩聲聞緣覺等諸賢聖廣造如是極重罪業當墮阿鼻地獄者若能志心於一日中清淨不食依法持誦此陀羅尼如是等罪皆得銷滅又若有人患諸瘧病若一日二日乃至七日或復眼痛耳痛鼻痛頭痛或復疥癩瘡癬癰疽腫疱及為一切非人邪鬼執魅持捉禁縛打擲呪咀期剋邪說惑亂以要言之總集一切身病心病乃至夢中見不祥事者以此陀羅尼加持力故悉得銷滅無能為害世尊又復若諸剎帝利婆羅門吠舍首陀如是等族姓中設有諂誑心者於此陀羅尼亦許聽受書寫讀誦乃至一切傍生異類亦應為彼念此陀羅尼令其得聞聞已隨應皆獲利益況復有諸發生清淨信解心者苾芻苾芻尼優婆塞優婆夷志心聽受此陀羅尼邪又復有人若於此陀羅尼祕密章句諦心思念時應當離諸過失所謂不謗不讚不生疑惑起離我心無久近心無造作心無染污心無高下心住如是心作念佛觀彼人即於十方各見千佛為現其前世尊若諸白衣舍中有是陀羅尼經處若主若僕見是經已設生輕易或復戲笑以我威神力故令其自然得聞此陀羅尼聲世尊譬如有人取栴檀香或復龍腦或復麝香持以敲打或復銼斫又以呪詞而為呪咀復於麁獷石上而以研磨用塗身分或有人言勿須敲打銼斫呪呾研磨栴檀等香既塗身已其香常在世尊我此不空王祕密心陀羅尼亦復如是設或有人雖生輕易或復戲笑乃至無誠實心但能供養此陀羅尼者彼人以是供養善根力故世世所生常得戒定慧等諸蘊具足妙香芬馥復次若有苾芻苾芻尼優婆塞優婆夷等欲受持此不空王祕密心陀羅尼時應於白月八日依法安布壇場供養行人當須清淨不食以無緣心誦此祕密心陀羅尼七遍是人當得二十種功德一者當於富貴中生二者生已所有宿世業病速得銷滅三者常得身肢細滑妙好諸根隱密人所愛樂四者得大財利五者所有財寶不為盜取六者所有財寶不為火焚水溺七者常得田疇增廣八者其田稼穡不為雷雹損傷九者其田不為惡雨霖澍十者色力精神無所損耗十一者常得一切衆生尊重愛樂十二者不為一切怨對所怖十三者設有怨對速疾除解十四者不為一切非人所怖十五者不為惡病纏縛十六者不為拏枳儞怖十七者遠離一切煩惱等事十八者不於水火刀兵毒害中死十九者在處常得諸賢聖等密作衛護二十者在在所生常得不離慈悲喜捨如是名為二十種功德復次世尊若有持誦此陀羅尼者別得八種善相一者臨命終時我作苾芻相為現其前二者臨命終時目不動亂身心安隱三者臨命終時手不拏空足不蹴地亦無大小便利穢污狼藉四者不覆面死五者臨命終時安住正念六者臨命終時不離善友七者命終已後諸佛剎中隨願往生八者當生獲得無盡辨才如是名為八種善相復次世尊若有人能清淨不食遠離五辛一切葷雜於日三時中念此陀羅尼三遍一切所求皆得成就又若有人隨應得聞此不空王祕密心陀羅尼正法已若能斷諸慳嫉除去一切垢染發清淨心尊重歸命祕密護持者是人當得墮菩薩數善為衆生作大饒益畢竟當成佛菩提果世尊此言菩提者即是正慧薩埵者即是方便若得如是慧及方便二法具足即能為衆生作饒益事爾時聖觀自在菩薩摩訶薩復白佛言世尊我今樂欲於如來前宣說所有祕密心陀羅尼普令會中四衆得聞利益安樂及餘一切作罪業者亦獲善利佛告聖觀自在菩薩摩訶薩言清淨大士汝應善說今正是時如來今日亦當隨喜乃至後末世中與修菩薩乘者為善依怙是時聖觀自在菩薩欣然舉目瞻仰世尊前白佛言此會諸菩薩衆應善諦聽復當歸命此解脫輪能與多人利益安樂悲愍世間善作一切大利樂事我今宣說此陀羅尼我先歸命過去未來現在三世善住諸佛菩薩及彼三世一切聲聞緣覺又復歸命無量光如來應供正等正覺歸命慈氏等諸菩薩摩訶薩歸命大智舍利子等諸阿羅漢即說陀羅尼曰那謨引囉怛那二合怛囉二合夜引野一句那莫阿引哩也二合引嚩路吉帝引說囉引野二地薩埵引野摩賀引薩埵引野三摩賀引哥嚕尼哥引野四伊毗踰二合引那莫塞訖哩三合埵引五一唐阿引哩也二合引嚩路引吉帝引說囉目枯引捺擬二合引蘭𧹞二合引六阿謨引伽播引商那引摩紇哩二合捺煬七怛他引誐多三目珂婆引始檐八摩訶怛波哩沙二合那末提引阿訶彌那引泥引摩引嚩哩多二合曳沙曳二合九悉𮊯切身下同覩彌引薩哩嚩二合哥引哩也二合引尼薩哩嚩二合婆曳數左彌引十犖力角切下同叉引婆嚩覩十一怛𭔞切身他引十二唵引左囉左囉十三唧哩唧哩十四祖嚕祖嚕十五摩賀引哥引嚕尼